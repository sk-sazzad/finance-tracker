name: Build and Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x finance-tracker/gradlew

      - name: Build Debug APK
        working-directory: finance-tracker
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: |
          mkdir -p release
          cp finance-tracker/app/build/outputs/apk/debug/app-debug.apk release/Finance-Tracker-latest.apk

      - name: Delete old release
        uses: dev-drprasad/delete-tag-and-release@v0.2.1
        with:
          delete_release: true
          tag_name: latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: Finance Tracker - Latest Build
          body: |
            ✅ Latest build — automatically updated on every commit.
          files: release/Finance-Tracker-latest.apk
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
