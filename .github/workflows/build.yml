name: Build and Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x finance-tracker/gradlew

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          python3 -c "
          import base64, os
          s = os.environ['KEYSTORE_BASE64']
          s += '=' * (-len(s) % 4)
          data = base64.b64decode(s)
          open('finance-tracker/finance-tracker.jks', 'wb').write(data)
          "

      - name: Build Release APK
        working-directory: finance-tracker
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.version.code=${{ github.run_number }} \
            -Pandroid.injected.version.name="1.${{ github.run_number }}" \
            -Pandroid.injected.signing.store.file=$(pwd)/finance-tracker.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=upload \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Rename APK
        run: |
          cp finance-tracker/app/build/outputs/apk/release/app-release.apk Finance-Tracker-latest.apk

      - name: Delete old release
        uses: dev-drprasad/delete-tag-and-release@v0.2.1
        with:
          delete_release: true
          tag_name: latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: Finance Tracker - Latest Build
          body: "✅ Latest build — automatically updated on every commit."
          files: Finance-Tracker-latest.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
